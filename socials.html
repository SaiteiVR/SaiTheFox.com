    <style>
        /* --- SOCIAL CARDS STYLING --- */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .social-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 800;
            font-size: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s, background 0.3s, color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .social-icon {
            width: 35px;
            height: 35px;
            fill: currentColor; /* Automatically matches the text color */
            transition: transform 0.3s;
        }

        /* The Hover Lift */
        .social-card:hover {
            transform: translateY(-8px);
        }

        .social-card:hover .social-icon {
            transform: scale(1.1); /* Icon pops slightly */
        }

        /* --- BRAND COLORS ON HOVER --- */
        
        /* Twitter / X (Black) */
        .social-card.twitter:hover {
            background: #0f1419;
            color: #ffffff;
            box-shadow: 0 15px 30px rgba(15, 20, 25, 0.2);
        }

        /* Bluesky (Blue) */
        .social-card.bluesky:hover {
            background: #0085ff;
            color: #ffffff;
            box-shadow: 0 15px 30px rgba(0, 133, 255, 0.3);
        }

        /* Discord (Blurple) */
        .social-card.discord:hover {
            background: #5865F2;
            color: #ffffff;
            box-shadow: 0 15px 30px rgba(88, 101, 242, 0.3);
        }

        /* GitHub (Dark Gray) */
        .social-card.github:hover {
            background: #24292e;
            color: #ffffff;
            box-shadow: 0 15px 30px rgba(36, 41, 46, 0.3);
        }
    </style>
</head>
