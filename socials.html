    <style>
        /* --- CSS VARIABLES (Pastel / Cute Theme) --- */
        :root {
            --bg-pattern: #fdfbf7;
            --paper-bg: #ffffff;
            --primary: #ff8fab;
            --secondary: #fb6f92;
            --tape-color: rgba(255, 200, 221, 0.85);
            --tape-color-alt: rgba(162, 210, 255, 0.85);
            --text-dark: #4a4e69;
            --text-light: #9a8c98;
        }

        /* --- GLOBAL RESETS & TYPOGRAPHY --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-pattern);
            background-image: radial-gradient(#c9ada7 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            @media (pointer: fine) { cursor: none; }
        }

        h1, h2, h3, .handwriting {
            font-family: 'Caveat', cursive;
        }

        /* --- NAVBAR --- */
        .navbar {
            display: flex;
            gap: 1rem;
            background: var(--paper-bg);
            padding: 15px 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 800px;
            border-radius: 30px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
            border: 2px dashed #d5bdaf;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }
        
        .navbar::-webkit-scrollbar { display: none; }

        .navbar a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.2s;
            @media (pointer: fine) { cursor: none; } 
        }

        .navbar a.active, .navbar a:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        @media (min-width: 700px) {
            .navbar { justify-content: center; }
        }

        /* --- DESKTOP ONLY: CURSOR & PARTICLES (For script.js) --- */
        .cursor-dot {
            width: 12px;
            height: 12px;
            background-color: var(--secondary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999 !important;
            transform: translate(-50%, -50%);
            display: none; 
        }

        .cursor-chaser {
            position: fixed;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 99998 !important;
            display: none; 
        }

        .cursor-chaser img { width: 100%; height: 100%; object-fit: contain; }

        .particle {
            position: fixed;
            background-color: var(--tape-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99997 !important;
            animation: fall linear forwards;
            display: none; 
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        @media (pointer: fine) {
            .cursor-dot, .cursor-chaser, .particle { display: block; }
        }

        /* --- SCRAPBOOK HEADER --- */
        .page-content {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 1rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 4rem;
            margin-top: 1rem;
        }

        .title-scrap {
            display: inline-block;
            background: var(--paper-bg);
            padding: 1rem 3.5rem;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            border: 2px dashed #d5bdaf;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.08);
            transform: rotate(-2deg);
            position: relative;
            font-size: 3.5rem;
            color: var(--secondary);
        }

        .title-scrap::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(3deg);
            width: 130px;
            height: 35px;
            background: var(--tape-color-alt);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            z-index: 2;
        }

        /* --- SOCIAL CARDS STYLING --- */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .social-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            background: var(--paper-bg);
            border-radius: 2px 15px 3px 15px / 15px 5px 25px 3px; /* Paper scrap edge */
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 800;
            font-size: 1.5rem;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
            transition: transform 0.3s, box-shadow 0.3s, background 0.3s, color 0.3s;
            position: relative;
            @media (pointer: fine) { cursor: none; }
        }

        /* Washi tape for the social cards */
        .social-card::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%) rotate(-3deg);
            width: 90px;
            height: 25px;
            background: var(--tape-color);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            z-index: 2;
            transition: background 0.3s;
        }

        .social-card:nth-child(even)::before {
            background: var(--tape-color-alt);
            transform: translateX(-50%) rotate(4deg);
        }

        .social-icon {
            width: 35px;
            height: 35px;
            fill: currentColor;
            transition: transform 0.3s;
        }

        /* The Hover Lift */
        .social-card:hover {
            transform: translateY(-8px) scale(1.02);
            z-index: 10;
        }

        .social-card:hover .social-icon {
            transform: scale(1.15) rotate(5deg);
        }

        /* --- BRAND COLORS ON HOVER --- */
        .social-card.twitter:hover {
            background: #0f1419;
            color: #ffffff;
            border-color: #0f1419;
            box-shadow: 0 15px 30px rgba(15, 20, 25, 0.2);
        }

        .social-card.bluesky:hover {
            background: #0085ff;
            color: #ffffff;
            border-color: #0085ff;
            box-shadow: 0 15px 30px rgba(0, 133, 255, 0.3);
        }

        .social-card.discord:hover {
            background: #5865F2;
            color: #ffffff;
            border-color: #5865F2;
            box-shadow: 0 15px 30px rgba(88, 101, 242, 0.3);
        }

        .social-card.github:hover {
            background: #24292e;
            color: #ffffff;
            border-color: #24292e;
            box-shadow: 0 15px 30px rgba(36, 41, 46, 0.3);
        }

        .social-card.instagram:hover {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 15px 30px rgba(225, 48, 108, 0.3);

        .social-card.twitch:hover {
            background: #9146FF;
            color: #ffffff;
            border-color: #9146FF;
            box-shadow: 0 15px 30px rgba(145, 70, 255, 0.3);

        .social-card.youtube:hover {
            background: #FF0000;
            color: #ffffff;
            border-color: #FF0000;
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.3);
        }
    </style>
