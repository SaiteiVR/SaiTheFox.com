<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saitei's Den | Interests</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS VARIABLES (Pastel / Scrapbook Theme) --- */
        :root {
            --bg-pattern: #fdfbf7;
            --paper-bg: #ffffff;
            --primary: #ff8fab;
            --secondary: #fb6f92;
            --tape-color: rgba(255, 200, 221, 0.85);
            --tape-color-alt: rgba(162, 210, 255, 0.85);
            --text-dark: #4a4e69;
            --text-light: #9a8c98;
        }

        /* --- GLOBAL RESETS & TYPOGRAPHY --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-pattern);
            background-image: radial-gradient(#c9ada7 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            @media (pointer: fine) { cursor: none; }
        }

        h1, h2, h3, .handwriting { font-family: 'Caveat', cursive; }

        /* --- NAVBAR --- */
        .navbar {
            display: flex;
            gap: 1rem;
            background: var(--paper-bg);
            padding: 15px 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 800px;
            border-radius: 30px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
            border: 2px dashed #d5bdaf;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }
        
        .navbar::-webkit-scrollbar { display: none; }

        .navbar a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.2s;
            @media (pointer: fine) { cursor: none; } 
        }

        .navbar a.active, .navbar a:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        @media (min-width: 700px) { .navbar { justify-content: center; } }

        /* --- DESKTOP ONLY: CURSOR & PARTICLES --- */
        .cursor-dot {
            width: 12px; height: 12px;
            background-color: var(--secondary);
            border-radius: 50%; position: fixed;
            pointer-events: none; z-index: 99999 !important;
            transform: translate(-50%, -50%); display: none; 
        }

        .cursor-chaser {
            position: fixed; width: 40px; height: 40px;
            pointer-events: none; z-index: 99998 !important; display: none; 
        }

        .cursor-chaser img { width: 100%; height: 100%; object-fit: contain; }

        .particle {
            position: fixed; background-color: var(--tape-color);
            border-radius: 50%; pointer-events: none; z-index: 99997 !important;
            animation: fall linear forwards; display: none; 
        }

        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
        @media (pointer: fine) { .cursor-dot, .cursor-chaser, .particle { display: block; } }

        /* --- PAGE HEADER --- */
        .page-content {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 1rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
            margin-top: 1rem;
        }

        .title-scrap {
            display: inline-block;
            background: var(--paper-bg);
            padding: 1rem 3.5rem;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            border: 2px dashed #d5bdaf;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.08);
            transform: rotate(-2deg);
            position: relative;
            font-size: 3.5rem;
            color: var(--secondary);
        }

        .title-scrap::before {
            content: ''; position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%) rotate(3deg);
            width: 130px; height: 35px; background: var(--tape-color-alt);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1); z-index: 2;
        }

        /* --- CATEGORIES & HORIZONTAL SCROLLING --- */
        .category-section { width: 100%; margin-bottom: 4rem; }

        .category-title {
            font-size: 3rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            margin-left: 1.5rem;
            font-family: 'Caveat', cursive;
            line-height: 1;
        }

        .scroll-container {
            display: flex;
            gap: 2.5rem;
            flex-wrap: wrap; /* Allows cards to drop to the next row */
            justify-content: center; /* Centers the scattered cards */
            padding: 2.5rem 1.5rem; /* Extra top padding gives the tape room to hover */
        }
        
        .scroll-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        /* --- POLAROID INTEREST CARDS --- */
        .interest-card {
            background: white;
            padding: 12px 12px 35px 12px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            position: relative;
            min-width: 200px;
            width: 200px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            @media (pointer: fine) { cursor: none; }
        }

        /* Washi tape for polaroids */
        .interest-card::before {
            content: ''; position: absolute; top: -12px; left: 50%;
            transform: translateX(-50%) rotate(-3deg);
            width: 80px; height: 25px; background: var(--tape-color);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1); z-index: 2;
        }

        .interest-card:nth-child(even)::before {
            background: var(--tape-color-alt);
            transform: translateX(-50%) rotate(5deg);
        }

        /* --- DYNAMIC ROW TILTING --- */
        .interest-card.tilt-left { transform: rotate(-1deg); }
        .interest-card.tilt-right { transform: rotate(1deg); }

        /* Ensure special glowing cards keep their extra flair when tilted */
        .interest-card.special.tilt-left { transform: rotate(-1deg); }
        .interest-card.special.tilt-right { transform: rotate(1deg); }

        /* Smooth hover states that respect the initial tilt direction */
        .interest-card.tilt-left:hover { 
            transform: translateY(-10px) scale(1.05) rotate(1deg); 
        }
        .interest-card.tilt-right:hover { 
            transform: translateY(-10px) scale(1.05) rotate(-1deg); 
        }

        .interest-cover {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: #eee;
            border: 1px solid #f0f0f0;
        }

        .music-cover {
            width: 100%;
            object-fit: cover;
            background: #eee;
            border: 1px solid #f0f0f0;
        }

        .interest-info { text-align: center; margin-top: 15px; }

        .interest-name {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--text-dark);
            line-height: 1.1;
            margin-bottom: 5px;
        }

        .interest-note { font-size: 0.9rem; color: var(--text-light); }

/* --- SPECIAL INTEREST HIGHLIGHT --- */
        .interest-card.special {
            border: 4px solid #ffd166; /* Thick golden border */
            box-shadow: 0 10px 25px rgba(255, 209, 102, 0.4); /* Glowing effect */
            transform: rotate(-1deg); /* A slightly different resting tilt */
        }

        .interest-card.special::after {
            content: '⭐';
            position: absolute;
            bottom: -15px; /* Overlaps the bottom right edge */
            right: -15px;
            font-size: 2.2rem;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
            z-index: 5;
            transform: rotate(10deg);
        }

        /* --- SCRAPBOOK MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(5px);
            z-index: 20000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background: var(--paper-bg);
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            border: 1px solid #e0e0e0;
            padding: 3rem 2.5rem;
            max-width: 450px; width: 90%;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.1);
            position: relative;
            transform: translateY(20px) rotate(-1deg);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            @media (pointer: fine) { cursor: none; }
        }

        .modal-overlay.active .modal-box { transform: translateY(0); }

        /* Modal Tape */
        .modal-box::before {
            content: ''; position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%) rotate(2deg);
            width: 120px; height: 35px; background: var(--tape-color);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1); z-index: 2;
        }

        .modal-close {
            position: absolute; top: 15px; right: 25px;
            font-size: 3rem; font-family: 'Caveat', cursive;
            line-height: 1; color: var(--secondary); cursor: pointer;
            transition: transform 0.2s;
        }

        .modal-close:hover { transform: scale(1.2); }

        .modal-cover {
            width: 180px; height: 260px; object-fit: cover;
            border-radius: 5px; margin-bottom: 1.5rem;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .modal-title {
            font-size: 2.8rem; color: var(--secondary);
            font-family: 'Caveat', cursive; line-height: 1.1; margin-bottom: 0.5rem;
        }

        .modal-stars { color: #ffd166; font-size: 1.8rem; margin-bottom: 1rem; letter-spacing: 4px; }
        .modal-review { font-size: 1.05rem; line-height: 1.6; color: var(--text-dark); }
    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-chaser"><img src="" alt="Chaser"></div>
    <div id="particles"></div>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="interests.html" class="active">Interests</a>
        <a href="socials.html">Socials</a>
        <a href="typingtest.html">Typing Game</a>
        <a href="wordle.html">(Not) Wordle</a>
    </nav>

    <section class="page-content">
        <div class="page-header">
            <h2 class="title-scrap">My Library</h2>
        </div>
        <div id="library-content"></div>
    </section>

    <div class="modal-overlay" id="interest-modal">
        <div class="modal-box">
            <span class="modal-close" id="close-modal">&times;</span>
            <img src="" alt="Cover" class="modal-cover" id="modal-img">
            <h3 class="modal-title" id="modal-title">Title</h3>
            <div class="modal-stars" id="modal-stars">★★★★★</div>
            <p class="modal-review" id="modal-review">Review text</p>
        </div>
    </div>

    <script src="interestsData.js"></script>

    <script>
        // --- CUSTOM CURSOR LOGIC ---
        const IMG_SITTING = "https://cdn-icons-png.flaticon.com/512/616/616430.png"; 
        const IMG_RUNNING = "https://cdn-icons-png.flaticon.com/512/616/616408.png"; 
        const MAX_SPEED = 8; 

        const cursorDot = document.querySelector('.cursor-dot');
        const chaser = document.querySelector('.cursor-chaser');
        const chaserImg = chaser.querySelector('img');
        const particleContainer = document.getElementById('particles');

        let mouseX = window.innerWidth / 2; 
        let mouseY = window.innerHeight / 2;
        let chaserX = window.innerWidth / 2; 
        let chaserY = window.innerHeight / 2;
        let isRunning = false;

        const isDesktop = () => window.matchMedia("(pointer: fine)").matches;

        if (isDesktop()) {
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                cursorDot.style.left = mouseX + 'px';
                cursorDot.style.top = mouseY + 'px';
            });
        }

        function animate() {
            if (isDesktop()) {
                let dx = mouseX - chaserX;
                let dy = mouseY - chaserY;
                let distance = Math.sqrt(dx*dx + dy*dy);

                if (distance > 5) {
                    let angle = Math.atan2(dy, dx); 
                    let degrees = angle * (180 / Math.PI); 
                    
                    let vx = dx * 0.1;
                    let vy = dy * 0.1;

                    let velocity = Math.sqrt(vx*vx + vy*vy);
                    if (velocity > MAX_SPEED) {
                        let ratio = MAX_SPEED / velocity;
                        vx *= ratio;
                        vy *= ratio;
                    }

                    chaserX += vx;
                    chaserY += vy;

                    chaser.style.transform = `translate(${chaserX}px, ${chaserY}px) rotate(${degrees + 90}deg) translate(-50%, -50%)`;

                    if (!isRunning) {
                        chaserImg.src = IMG_RUNNING;
                        isRunning = true;
                    }
                } else {
                    if (isRunning) {
                        chaserImg.src = IMG_SITTING;
                        isRunning = false;
                        chaser.style.transform = `translate(${chaserX}px, ${chaserY}px) rotate(0deg) translate(-50%, -50%)`;
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        animate();

        if(particleContainer && isDesktop()) {
            function createParticle() {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 10 + 5 + 'px';
                p.style.width = size;
                p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-20px'; 
                p.style.animationDuration = Math.random() * 5 + 5 + 's';
                particleContainer.appendChild(p);
                setTimeout(() => p.remove(), 10000);
            }
            setInterval(createParticle, 600);
        }

        // --- INTERESTS LIBRARY LOGIC ---
        const libraryContainer = document.getElementById('library-content');
        
        const modal = document.getElementById('interest-modal');
        const closeModal = document.getElementById('close-modal');
        const modalImg = document.getElementById('modal-img');
        const modalTitle = document.getElementById('modal-title');
        const modalStars = document.getElementById('modal-stars');
        const modalReview = document.getElementById('modal-review');

        closeModal.onclick = () => modal.classList.remove('active');
        window.onclick = (e) => {
            if(e.target === modal) modal.classList.remove('active'); 
        };

        const categories = ["General", "Games", "Movies", "Shows", "Books", "Music"];

        if (typeof interestsData !== 'undefined') {
            categories.forEach(cat => {
                const items = interestsData.filter(item => item.category === cat);

                if (items.length > 0) {
                    const section = document.createElement('div');
                    section.classList.add('category-section');
                    
                    const title = document.createElement('h3');
                    title.classList.add('category-title');
                    title.innerText = cat;
                    section.appendChild(title);

                    const scrollBox = document.createElement('div');
                    scrollBox.classList.add('scroll-container');

                    items.forEach(item => {
                        const card = document.createElement('div');
                        card.classList.add('interest-card');
                        if(item.special) card.classList.add('special');
                        
                        card.style.cursor = 'pointer'; 

                        if (cat != "Music") {
                        card.innerHTML = `
                            <img src="${item.cover}" alt="${item.name}" class="interest-cover">
                            <div class="interest-info">
                                <div class="interest-name">${item.name}</div>
                                <div class="interest-note">${item.note}</div>
                            </div>
                        `;
                        } else {
                            card.innerHTML = `
                                <img src="${item.cover}" alt="${item.name}" class="music-cover">
                                <div class="interest-info">
                                    <div class="interest-name">${item.name}</div>
                                    <div class="interest-note">${item.note}</div>
                                </div>
                            `;
                        }

                        card.onclick = () => {
                            modalImg.src = item.cover;
                            modalTitle.innerText = item.name;
                            modalReview.innerText = item.review || "No review written yet!"; 
                            
                            let starHTML = "";
                            let rating = item.rating || 0; 
                            for(let i = 1; i <= 5; i++) {
                                starHTML += (i <= rating) ? "★" : "☆";
                            }
                            modalStars.innerText = starHTML;

                            modal.classList.add('active');
                        };

                        scrollBox.appendChild(card);
                    });

                    section.appendChild(scrollBox);
                    libraryContainer.appendChild(section);
                }
            });

            // --- NEW: DYNAMIC ROW MATH ---
            function updateCardTilts() {
                const containers = document.querySelectorAll('.scroll-container');
                
                containers.forEach(container => {
                    const cards = Array.from(container.querySelectorAll('.interest-card'));
                    if (cards.length === 0) return;

                    let currentRowTop = cards[0].offsetTop;
                    let rowIndex = 0;

                    cards.forEach(card => {
                        // If the card is pushed down more than 20px, it has wrapped to a new row!
                        if (card.offsetTop > currentRowTop + 20) {
                            rowIndex++;
                            currentRowTop = card.offsetTop;
                        }

                        // Strip old classes just in case the window was resized
                        card.classList.remove('tilt-left', 'tilt-right');

                        // Evens tilt left, Odds tilt right
                        if (rowIndex % 2 === 0) {
                            card.classList.add('tilt-left'); 
                        } else {
                            card.classList.add('tilt-right'); 
                        }
                    });
                });
            }

            // 1. Run the math immediately after building the cards
            updateCardTilts();

            // 2. Re-calculate the rows anytime the user resizes their browser window
            window.addEventListener('resize', updateCardTilts);

        } else {
             libraryContainer.innerHTML = "<p style='text-align: center; width: 100%;'>Loading interests...</p>";
        }
    </script>
</body>
</html>
