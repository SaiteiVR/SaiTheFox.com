<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saitei's Den | Wordle</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS VARIABLES (Pastel / Hybrid Theme) --- */
        :root {
            --bg-pattern: #fdfbf7;
            --paper-bg: #ffffff;
            --primary: #ff8fab;
            --secondary: #fb6f92;
            --tape-color: rgba(255, 200, 221, 0.85);
            --text-dark: #4a4e69;
            --text-light: #9a8c98;
            --radius: 20px;
            
            /* Wordle Specific Variables */
            --w-green: #8bdc9e;  
            --w-yellow: #f9d56e; 
            --w-gray: #d4c5ce;   
            --w-tile: #ffffff;
            --w-border: var(--primary);
            --w-key-bg: rgba(255, 255, 255, 0.8);
        }

        /* --- GLOBAL RESETS & TYPOGRAPHY --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-pattern);
            background-image: radial-gradient(#c9ada7 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            @media (pointer: fine) { cursor: none; }
        }

        h1, h2, h3, .handwriting {
            font-family: 'Caveat', cursive;
        }

        /* --- NAVBAR --- */
        .navbar {
            display: flex;
            gap: 1rem;
            background: var(--paper-bg);
            padding: 15px 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 800px;
            border-radius: 30px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
            border: 2px dashed #d5bdaf;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            position: relative;
            z-index: 20; 
        }
        
        .navbar::-webkit-scrollbar { display: none; }

        .navbar a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.2s;
            @media (pointer: fine) { cursor: none; } 
        }

        .navbar a.active, .navbar a:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        @media (min-width: 700px) {
            .navbar { justify-content: center; }
        }

        /* --- DESKTOP ONLY: CURSOR & PARTICLES --- */
        .cursor-dot {
            width: 12px; height: 12px; background-color: var(--secondary);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 99999 !important; transform: translate(-50%, -50%); display: none; 
        }

        .cursor-chaser {
            position: fixed; width: 40px; height: 40px; pointer-events: none;
            z-index: 99998 !important; display: none; 
        }

        .cursor-chaser img { width: 100%; height: 100%; object-fit: contain; }

        .particle {
            position: fixed; background-color: var(--tape-color); border-radius: 50%;
            pointer-events: none; z-index: 1; 
            animation: fall linear forwards; display: none; 
        }

        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
        @media (pointer: fine) { .cursor-dot, .cursor-chaser, .particle { display: block; } }

        /* --- WORDLE SPECIFIC STYLES --- */
        .page-content {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 1rem;
            display: flex;
            justify-content: center;
        }

        .wordle-container {
            width: 100%;
            max-width: 650px; /* Widened from 500px */
            background: rgba(255,255,255,0.75); 
            backdrop-filter: blur(12px);
            padding: 2.5rem 3rem;
            border-radius: var(--radius);
            box-shadow: 0 15px 35px rgba(251, 111, 146, 0.15);
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            z-index: 10; 
        }

        .w-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            border-bottom: 2px dashed #d5bdaf;
            padding-bottom: 1rem;
        }

        .w-title h1 {
            font-size: 2.8rem;
            color: var(--secondary);
            margin: 0;
            line-height: 1;
        }

        .w-stats {
            display: flex;
            gap: 15px;
            font-size: 1.1rem;
            color: var(--text-dark);
            font-weight: bold;
        }

        .w-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .w-controls select, .w-controls button {
            background: white;
            border: 2px solid var(--primary);
            color: var(--text-dark);
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            transition: transform 0.2s, background 0.2s, color 0.2s;
            @media (pointer: fine) { cursor: none; }
        }

        .w-controls button.primary {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        .w-controls button:hover, .w-controls select:hover {
            transform: translateY(-2px);
            background: var(--primary);
            color: white;
        }

        /* --- BOARD --- */
        .board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 10px; /* Increased from 8px */
            max-width: 380px; /* Scaled up from 320px */
            margin: 0 auto 30px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px; /* Increased from 8px */
        }

        .tile {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 2rem;
            background: var(--w-tile);
            border: 2px solid var(--w-border);
            border-radius: 12px;
            color: var(--text-dark);
            text-transform: uppercase;
            user-select: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            /* Preserve 3D space for smooth flipping */
            transform-style: preserve-3d;
        }

        /* Input Bump Animation */
        .tile.filled { animation: pop .1s ease; }
        @keyframes pop { 
            0% {transform: scale(.9)} 
            100% {transform: scale(1)} 
        }

        /* Cascading Flip Animations */
        .flip-in { animation: flipIn 0.25s ease-in forwards; }
        .flip-out { animation: flipOut 0.25s ease-out forwards; }
        
        @keyframes flipIn { 
            to { transform: rotateX(90deg); } 
        }
        @keyframes flipOut { 
            from { transform: rotateX(-90deg); } 
            to { transform: rotateX(0deg); } 
        }

        /* --- KEYBOARD --- */
        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            width: 100%; /* Force keyboard to stay inside container */
        }

        .keyrow {
            display: flex;
            gap: 6px;
            width: 100%; /* Use full available width */
            justify-content: center;
        }

        .key {
            flex: 1; /* Allow keys to shrink and grow dynamically */
            max-width: 45px; /* Cap width on large screens */
            min-width: 0; /* Crucial for allowing keys to shrink on tiny screens */
            padding: 16px 0; /* Vertical padding only, horizontal handles itself */
            border-radius: 10px;
            border: 2px solid transparent;
            background: var(--w-key-bg);
            color: var(--text-dark);
            font-weight: 800;
            font-size: 1.1rem;
            font-family: inherit;
            transition: transform 0.2s, border-color 0.2s;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transform-style: preserve-3d;
            @media (pointer: fine) { cursor: none; }
        }

        .key:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .key.wide { 
            flex: 1.5; /* Enter/Del keys get 1.5x width of a standard key */
            max-width: 65px; 
            font-size: 0.9rem; 
        }
        
        .key.color-gray { background: var(--w-gray); color: white; border-color: var(--w-gray); }
        .key.color-yellow { background: var(--w-yellow); color: white; border-color: var(--w-yellow); }
        .key.color-green { background: var(--w-green); color: white; border-color: var(--w-green); }

        .message {
            text-align: center;
            height: 24px;
            color: var(--secondary);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-chaser"><img src="" alt="Chaser"></div>
    <div id="particles"></div>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="interests.html">Interests</a>
        <a href="socials.html">Socials</a>
        <a href="typingtest.html">Typing Game</a>
        <a href="wordle.html" class="active">(Not) Wordle</a>
    </nav>

    <section class="page-content">
        <div class="wordle-container">
            <div class="w-header">
                <div class="w-title">
                    <h1>Saitei's Wordle</h1>
                </div>
                <div class="w-stats">
                    <span id="stat-games">G: 0</span>
                    <span id="stat-wins">W: 0</span>
                    <span id="stat-streak">🔥 0</span>
                </div>
            </div>

            <div class="w-controls">
                <select id="modeSelect">
                    <option value="daily">Daily Word</option>
                    <option value="random">Random Word</option>
                </select>
                <button id="newRandom" class="primary">New Game</button>
            </div>

            <div id="message" class="message"></div>
            <div id="board" class="board"></div>
            <div id="keyboard" class="keyboard"></div>
        </div>
    </section>

    <script>
        const IMG_SITTING = "https://cdn-icons-png.flaticon.com/512/616/616430.png"; 
        const IMG_RUNNING = "https://cdn-icons-png.flaticon.com/512/616/616408.png"; 
        const MAX_SPEED = 8; 

        const cursorDot = document.querySelector('.cursor-dot');
        const chaser = document.querySelector('.cursor-chaser');
        const chaserImg = chaser.querySelector('img');
        const particleContainer = document.getElementById('particles');

        let mouseX = window.innerWidth / 2; let mouseY = window.innerHeight / 2;
        let chaserX = window.innerWidth / 2; let chaserY = window.innerHeight / 2;
        let isRunning = false;

        const isDesktop = () => window.matchMedia("(pointer: fine)").matches;

        if (isDesktop()) {
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
                cursorDot.style.left = mouseX + 'px'; cursorDot.style.top = mouseY + 'px';
            });
        }

        function animate() {
            if (isDesktop()) {
                let dx = mouseX - chaserX; let dy = mouseY - chaserY;
                let distance = Math.sqrt(dx*dx + dy*dy);

                if (distance > 5) {
                    let angle = Math.atan2(dy, dx); let degrees = angle * (180 / Math.PI); 
                    let vx = dx * 0.1; let vy = dy * 0.1;

                    let velocity = Math.sqrt(vx*vx + vy*vy);
                    if (velocity > MAX_SPEED) {
                        let ratio = MAX_SPEED / velocity;
                        vx *= ratio; vy *= ratio;
                    }

                    chaserX += vx; chaserY += vy;
                    chaser.style.transform = `translate(${chaserX}px, ${chaserY}px) rotate(${degrees + 90}deg) translate(-50%, -50%)`;

                    if (!isRunning) { chaserImg.src = IMG_RUNNING; isRunning = true; }
                } else {
                    if (isRunning) {
                        chaserImg.src = IMG_SITTING; isRunning = false;
                        chaser.style.transform = `translate(${chaserX}px, ${chaserY}px) rotate(0deg) translate(-50%, -50%)`;
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        if(particleContainer && isDesktop()) {
            function createParticle() {
                const p = document.createElement('div'); p.classList.add('particle');
                const size = Math.random() * 10 + 5 + 'px';
                p.style.width = size; p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw'; p.style.top = '-20px'; 
                p.style.animationDuration = Math.random() * 5 + 5 + 's';
                particleContainer.appendChild(p); setTimeout(() => p.remove(), 10000);
            }
            setInterval(createParticle, 600);
        }
    </script>

    <script>
        const WORD_LENGTH = 5;
        const MAX_ROWS = 6;
        const baseDate = new Date(2024,0,1); 

        let mode = localStorage.getItem('mini_wordle_mode') || 'daily';
        let solution = '';
        let solutionId = '';
        let grid = Array.from({length:MAX_ROWS},()=>Array(WORD_LENGTH).fill(''));
        let currentRow = 0;
        let currentCol = 0;
        let isGameOver = false;
        let isAnimating = false; // Block typing during cascades
        let stats = loadStats();

        let WORDS = [];
        let allowedSet = new Set();

        const boardEl = document.getElementById('board');
        const keyboardEl = document.getElementById('keyboard');
        const modeSelect = document.getElementById('modeSelect');
        const newRandomBtn = document.getElementById('newRandom');
        const messageEl = document.getElementById('message');

        (async function initializeGame() {
            await loadWords();
            if (WORDS.length > 0) {
                modeSelect.value = mode;
                initUI();
                startGame(mode, false);
            }
        })();

        async function loadWords() {
            try {
                const res = await fetch('Words.json', { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to load words file.');

                const data = await res.json();
                WORDS = data.solutions.map(w => w.toLowerCase());
                
                const allowedArr = data.allowed ? data.allowed : data.solutions;
                allowedSet = new Set(allowedArr.map(w => w.toLowerCase()));

                if (!WORDS.length) throw new Error('No words found in JSON.');
            } catch (err) {
                console.error(err);
                message('Failed to load words.json');
            }
        }

        function initUI(){
            updateStatsUI();
            modeSelect.addEventListener('change', e=>{
                mode = e.target.value;
                localStorage.setItem('mini_wordle_mode', mode);
                startGame(mode, true);
            });
            newRandomBtn.addEventListener('click', ()=> startGame('random', true));
            window.addEventListener('keydown', onKeydown);
            buildBoardHTML(); 
            renderKeyboard();
        }

        function startGame(requestedMode, forceNewRandom){
            isGameOver = false;
            isAnimating = false;
            currentRow = 0;
            currentCol = 0;
            grid = Array.from({length:MAX_ROWS},()=>Array(WORD_LENGTH).fill(''));
            message('');
            mode = requestedMode || mode;
            modeSelect.value = mode;
            
            if(mode === 'daily'){
                solutionId = getDateString(new Date());
                solution = pickDaily();
            } else {
                solution = pickRandom();
                solutionId = 'random_' + Date.now().toString(36);
            }
            
            // Wipe board and keyboard clean visually
            clearBoardVisuals();
            resetKeyboardColors();
        }

        function pickDaily(){
            const today = new Date();
            const days = Math.floor((Date.UTC(today.getFullYear(),today.getMonth(),today.getDate()) - Date.UTC(baseDate.getFullYear(),baseDate.getMonth(),baseDate.getDate())) / 86400000);
            const idx = Math.abs(days) % WORDS.length;
            return WORDS[idx];
        }

        function pickRandom(){
            return WORDS[Math.floor(Math.random()*WORDS.length)];
        }

        function getDateString(d){
            return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        }

        // --- NEW: Board Building & Updating ---
        function buildBoardHTML() {
            boardEl.innerHTML = '';
            for(let r=0; r<MAX_ROWS; r++){
                const row = document.createElement('div');
                row.className='row';
                for(let c=0; c<WORD_LENGTH; c++){
                    const tile = document.createElement('div');
                    tile.className='tile';
                    row.appendChild(tile);
                }
                boardEl.appendChild(row);
            }
        }

        function clearBoardVisuals() {
            for(let r=0; r<MAX_ROWS; r++){
                const rowEl = boardEl.children[r];
                for(let c=0; c<WORD_LENGTH; c++){
                    const tile = rowEl.children[c];
                    tile.textContent = '';
                    tile.style.background = '';
                    tile.style.borderColor = '';
                    tile.style.color = '';
                    tile.className = 'tile'; // Strip animation classes
                }
            }
        }

        function updateBoardText() {
            const rowEl = boardEl.children[currentRow];
            for(let c=0; c<WORD_LENGTH; c++){
                const tile = rowEl.children[c];
                const ch = grid[currentRow][c] || '';
                
                // Add pop animation if a letter was just typed
                if(tile.textContent !== ch) {
                    tile.textContent = ch;
                    if(ch !== '') {
                        tile.classList.add('filled');
                        setTimeout(() => tile.classList.remove('filled'), 150);
                    }
                }
            }
        }

        // --- NEW: Keyboard Building & Animating ---
        function renderKeyboard(){
            const layout = ["qwertyuiop","asdfghjkl","zxcvbnm"];
            keyboardEl.innerHTML = '';
            layout.forEach((line, idx) => {
                const row = document.createElement('div');
                row.className='keyrow';
                if(idx===2){
                    const enter = makeKey('Enter', 'wide');
                    enter.addEventListener('click', onEnter);
                    row.appendChild(enter);
                }
                for(const ch of line){
                    const key = makeKey(ch);
                    key.addEventListener('click', ()=>onKey(ch));
                    row.appendChild(key);
                }
                if(idx===2){
                    const back = makeKey('Del', 'wide');
                    back.addEventListener('click', onBackspace);
                    row.appendChild(back);
                }
                keyboardEl.appendChild(row);
            });
        }

        function makeKey(label, extraClass=''){
            const k = document.createElement('button');
            k.className = 'key ' + (extraClass||'');
            k.textContent = label.toUpperCase();
            k.dataset.key = label.toLowerCase();
            return k;
        }

        function resetKeyboardColors() {
            document.querySelectorAll('.key').forEach(k => {
                k.classList.remove('color-green', 'color-yellow', 'color-gray', 'flip-in', 'flip-out');
            });
        }

        // Only animates keys that upgrade to a better color
        function animateKeyboardColors(guess, colors) {
            for(let i=0; i<guess.length; i++) {
                const ch = guess[i];
                const col = colors[i];
                const k = document.querySelector(`.key[data-key="${ch}"]`);
                if(!k) continue;

                const currentClass = k.classList.contains('color-green') ? 'green' : 
                                     k.classList.contains('color-yellow') ? 'yellow' : 
                                     k.classList.contains('color-gray') ? 'gray' : null;
                
                let newClass = col;
                if(currentClass === 'green') newClass = 'green';
                else if(currentClass === 'yellow' && col !== 'green') newClass = 'yellow';
                
                if(currentClass !== newClass) {
                    setTimeout(() => {
                        k.classList.add('flip-in');
                        setTimeout(() => {
                            k.classList.remove('flip-in', 'color-gray', 'color-yellow', 'color-green');
                            k.classList.add('color-' + newClass);
                            k.classList.add('flip-out');
                            setTimeout(() => k.classList.remove('flip-out'), 250);
                        }, 250);
                    }, i * 150); // Stagger the key flips slightly
                }
            }
        }

        // --- Interaction Logic ---
        function onKey(ch){
            if(isGameOver || isAnimating) return;
            if(currentCol < WORD_LENGTH){
                grid[currentRow][currentCol] = ch;
                currentCol++;
                updateBoardText();
            }
        }

        function onBackspace(){
            if(isGameOver || isAnimating) return;
            if(currentCol > 0){
                currentCol--;
                grid[currentRow][currentCol] = '';
                updateBoardText();
            }
        }

        function onEnter(){
            if(isGameOver || isAnimating) return;
            const guess = grid[currentRow].join('');
            if(guess.length !== WORD_LENGTH){
                message('Not enough letters!');
                return;
            }
            if(!allowedSet.has(guess)){
                message('Word not in list!');
                return;
            }
            
            isAnimating = true; // Lock controls
            const colors = scoreGuess(guess, solution);
            const rowEl = boardEl.children[currentRow];

            // Cascade Flip Animation for the Board
            for (let i = 0; i < WORD_LENGTH; i++) {
                setTimeout(() => {
                    const tile = rowEl.children[i];
                    tile.classList.add('flip-in');
                    
                    setTimeout(() => {
                        tile.classList.remove('flip-in');
                        
                        // Change color mid-flip
                        tile.style.background = colors[i] === 'green' ? 'var(--w-green)' : colors[i] === 'yellow' ? 'var(--w-yellow)' : 'var(--w-gray)';
                        tile.style.borderColor = tile.style.background;
                        tile.style.color = 'white';
                        
                        tile.classList.add('flip-out');
                        setTimeout(() => tile.classList.remove('flip-out'), 250);

                        // If this is the last tile, unlock and move to next row
                        if (i === WORD_LENGTH - 1) {
                            setTimeout(() => {
                                isAnimating = false;
                                animateKeyboardColors(guess, colors);
                                currentRow++;
                                currentCol = 0;
                                checkWinCondition(guess);
                            }, 250);
                        }
                    }, 250); // Halfway point
                }, i * 250); // Stagger tiles by 250ms
            }
        }

        function checkWinCondition(guess) {
            if(guess === solution){
                isGameOver = true;
                message('You win! 🎉');
                recordResult(true);
            } else if(currentRow >= MAX_ROWS){
                isGameOver = true;
                message('Word was: ' + solution.toUpperCase());
                recordResult(false);
            }
        }

        function scoreGuess(guess, sol){
            const res = Array(WORD_LENGTH).fill('gray');
            const solChars = sol.split('');
            for(let i=0;i<WORD_LENGTH;i++){
                if(guess[i] === solChars[i]){
                    res[i] = 'green';
                    solChars[i] = null; 
                }
            }
            for(let i=0;i<WORD_LENGTH;i++){
                if(res[i] === 'green') continue;
                const idx = solChars.indexOf(guess[i]);
                if(idx !== -1){
                    res[i] = 'yellow';
                    solChars[idx] = null;
                }
            }
            return res;
        }

        function onKeydown(e){
            // Ensure we aren't blocking shortcuts like Ctrl+R or F5
            if(e.ctrlKey || e.metaKey || e.altKey) return;
            
            if(isGameOver || isAnimating) return;
            if(e.key === 'Backspace') { onBackspace(); return; }
            if(e.key === 'Enter') { onEnter(); return; }
            const k = e.key.toLowerCase();
            if(k.length === 1 && k >= 'a' && k <= 'z') onKey(k);
        }

        function message(text){
            messageEl.textContent = text || '';
            if(text) setTimeout(()=> { if(messageEl.textContent === text) messageEl.textContent=''; }, 2000);
        }

        function loadStats(){
            try{ return JSON.parse(localStorage.getItem('saitei_wordle_stats')) || {games:0,wins:0,streak:0}; }
            catch(e){ return {games:0,wins:0,streak:0}; }
        }

        function recordResult(win){
            stats.games++;
            if(win) { stats.wins++; stats.streak++; }
            else { stats.streak = 0; }
            localStorage.setItem('saitei_wordle_stats', JSON.stringify(stats));
            updateStatsUI();
        }

        function updateStatsUI(){
            document.getElementById('stat-games').textContent = 'G: ' + stats.games;
            document.getElementById('stat-wins').textContent = 'W: ' + stats.wins;
            document.getElementById('stat-streak').textContent = '🔥 ' + stats.streak;
        }
    </script>
</body>
